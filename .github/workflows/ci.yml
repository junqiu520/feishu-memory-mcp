name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs on the same branch when a new push lands
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Skip live E2E tests in CI; they require real Feishu credentials.
  # They can be run manually via `pytest -m live tests/feishu/test_bitable_live.py`
  PYTEST_DISABLE_LIVE: "1"

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps (lark-cli requires Node.js 18+)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install lark-cli (skipped for unit tests; some imports check `lark-cli` is on PATH)
        run: |
          npm install -g @larksuite/cli

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Cache HF models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Run pytest (mock unit tests only)
        env:
          # Speed: skip sentence-transformers model load
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # -m "not live" excludes live E2E tests
          # --timeout=60 caps any hung test
          python -m pytest tests/ -m "not live" --timeout=60 -q

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: ruff check (errors fail the build)
        run: |
          ruff check src/ tests/
      - name: ruff format (warning only — reformat in a follow-up PR)
        run: |
          ruff format --check src/ tests/ || echo "::warning::ruff format drift; run 'ruff format' locally"

  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" build
      - name: Build
        run: |
          python -m build --sdist --wheel
          ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
